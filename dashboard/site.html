<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Demo Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }
        header {
            background-color: #2563eb;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .btn-dash {
            background-color: #1e40af;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }
        .btn-dash:hover { background-color: #1e3a8a; }
        
        .container {
            max-width: 900px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 { margin-top: 0; font-size: 1.25rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background-color: #1d4ed8; }
        
        .console {
            grid-column: span 2;
            background: #111827;
            color: #10b981;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .console p { margin: 5px 0; }
        .log-error { color: #ef4444; }
        .log-success { color: #10b981; }
        .log-info { color: #60a5fa; }
    </style>
</head>
<body>

    <header>
        <h1>My Web App (Protected by WAF)</h1>
        <a href="/dashboard_ui" target="_blank" class="btn-dash">View WAF Dashboard 📊</a>
    </header>

    <div class="container">
        
        <!-- Search Feature -->
        <div class="card">
            <h2>Product Search</h2>
            <form id="searchForm">
                <div class="form-group">
                    <label>Search Query</label>
                    <input type="text" id="searchInput" placeholder="e.g. laptop, or ' OR 1=1">
                    <small style="color:#6b7280; font-size:0.8rem;">Try SQLi: ' OR 1=1</small><br>
                    <small style="color:#6b7280; font-size:0.8rem;">Try XSS: &lt;script&gt;alert(1)&lt;/script&gt;</small>
                </div>
                <button type="submit">Search</button>
            </form>
        </div>

        <!-- Login Feature -->
        <div class="card">
            <h2>Administrator Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="usernameInput" placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" placeholder="********">
                    <small style="color:#6b7280; font-size:0.8rem;">Try Command Injection: admin; ls</small>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- System Console Area -->
        <div class="console" id="consoleOutput">
            <p class="log-info">> System Initialized. Waiting for requests...</p>
        </div>

    </div>

    <script>
        const consoleOut = document.getElementById('consoleOutput');

        function logToConsole(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            let className = 'log-info';
            if (type === 'error') className = 'log-error';
            if (type === 'success') className = 'log-success';
            
            consoleOut.innerHTML += `<p class="${className}">[${time}] ${message}</p>`;
            consoleOut.scrollTop = consoleOut.scrollHeight;
        }

        // Search Form Submission
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.defaultPrevented = true;
            e.preventDefault();
            const query = document.getElementById('searchInput').value;
            logToConsole(`Sending GET /search?q=${encodeURIComponent(query)}`, 'info');

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (response.ok) {
                    logToConsole(`SUCCESS (200 OK): ${data.message}`, 'success');
                } else {
                    logToConsole(`BLOCKED (403 Forbidden): ${data.message} Rules Triggered: ${data.rule_triggered || 'IP Banned'}`, 'error');
                }
            } catch (err) {
                logToConsole(`ERROR: ${err.message}`, 'error');
            }
        });

        // Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.defaultPrevented = true;
            e.preventDefault();
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            logToConsole(`Sending POST /login`, 'info');

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const response = await fetch(`/login`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    logToConsole(`SUCCESS (200 OK): ${data.message}`, 'success');
                } else {
                    logToConsole(`BLOCKED (403 Forbidden): ${data.message} Rules Triggered: ${data.rule_triggered || 'IP Banned'}`, 'error');
                }
            } catch (err) {
                logToConsole(`ERROR: ${err.message}`, 'error');
            }
        });
    </script>
</body>
</html>
